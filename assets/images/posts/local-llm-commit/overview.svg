<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font: bold 42px sans-serif; fill: #e6edf3; }
.subtitle { font: 20px sans-serif; fill: #9da7b3; }
.box { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 12; }
.arrow { stroke: #60a5fa; stroke-width: 4; marker-end: url(#arrowhead); }
.label { font: 16px monospace; fill: #93c5fd; }
</style>

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7"
refX="10" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
</marker>
</defs>

<rect width="1200" height="420" fill="#0f172a"/>

<text x="600" y="80" text-anchor="middle" class="title">
Local LLM for Git Commit Messages
</text>

<text x="600" y="120" text-anchor="middle" class="subtitle">
Fine-tuning 
Qwen3.5-2B-Base with MLX + LoRA
</text>

<!-- Git Diff -->
<rect x="150" y="200" width="180" height="80" class="box"/>
<text x="240" y="240" text-anchor="middle" class="label">Git Diff</text>
<text x="240" y="260" text-anchor="middle" class="label">+ code</text>

<!-- LoRA -->
<rect x="420" y="200" width="180" height="80" class="box"/>
<text x="510" y="245" text-anchor="middle" class="label">LoRA</text>

<!-- LLM -->
<rect x="690" y="200" width="180" height="80" class="box"/>
<text x="780" y="240" text-anchor="middle" class="label">Qwen LLM</text>
<text x="780" y="265" text-anchor="middle" class="label">Qwen3.5-2B-Base</text>

<!-- Commit -->
<rect x="960" y="200" width="180" height="80" class="box"/>
<text x="1050" y="240" text-anchor="middle" class="label">Commit</text>
<text x="1050" y="260" text-anchor="middle" class="label">feat: add JWT</text>

<!-- Arrows -->
<line x1="330" y1="240" x2="420" y2="240" class="arrow"/>
<line x1="600" y1="240" x2="690" y2="240" class="arrow"/>
<line x1="870" y1="240" x2="960" y2="240" class="arrow"/>

</svg>